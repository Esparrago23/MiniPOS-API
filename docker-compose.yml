services:
  api:
    build: .
    container_name: minipos-api
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-development-secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/minipos.db}
    ports:
      - "8000:8000"
    volumes:
      - minipos_data:/app/data

volumes:
  minipos_data:
